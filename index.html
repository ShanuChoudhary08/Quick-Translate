<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick-Translate | Simple Layout</title>
    <style>
        body {
            background-color: #0b071e;
            color: #ffffff;
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .workspace {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        textarea, .output-box {
            width: 50%;
            height: 200px;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            box-sizing: border-box;
        }
        textarea {
            background-color: #161233;
            color: #fff;
            border: 1px solid #4f46e5;
            resize: none;
        }
        .output-box {
            background-color: #1c183a;
            color: #a78bfa;
            border: 1px solid #7c3aed;
            text-align: left;
            overflow-y: auto;
            white-space: pre-wrap;
        }
        .btn {
            background: #4f46e5;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.2s;
        }
        .btn:hover {
            background: #4338ca;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Quick-Translate Studio</h2>
        <p>Type in English on the left, then click Translate to get Hindi output.</p>
        
        <div class="workspace">
            <textarea id="inputText" placeholder="CLICK HERE TO TYPE TEXT..."></textarea>
            
            <div id="outputText" class="output-box">Translation will appear here...</div>
        </div>

        <button class="btn" onclick="triggerManualTranslation()">Translate Now</button>
    </div>

    <script>
        async function triggerManualTranslation() {
            const text = document.getElementById('inputText').value;
            const outputDiv = document.getElementById('outputText');
            
            if (!text.trim()) {
                outputDiv.innerText = "Please type something first!";
                return;
            }

            outputDiv.innerText = "Translating...";

            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=hi&dt=t&q=${encodeURIComponent(text)}`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data && data[0]) {
                    const translated = data[0].map(item => item[0]).join('');
                    outputDiv.innerText = translated;
                } else {
                    outputDiv.innerText = "Error parsing translation.";
                }
            } catch (err) {
                outputDiv.innerText = "Network error. Please check your internet connection.";
            }
        }
    </script>
</body>
</html>
